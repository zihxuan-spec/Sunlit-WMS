<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sunlit WMS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-title" content="Sunlit WMS">
  <meta name="application-name" content="Sunlit WMS">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon.png">
  <link rel="manifest" href="/manifest.json">
  <!-- Fix 1: Apply theme class BEFORE React mounts to prevent flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('wms_theme') || 'light';
      if (theme === 'light') document.documentElement.classList.add('light');
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
